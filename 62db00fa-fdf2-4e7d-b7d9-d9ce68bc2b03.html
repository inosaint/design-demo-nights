            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        .main-container {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            align-items: center;
            padding: 4rem;

        .content-col {
            padding-right: 2rem;
            z-index: 10;

        .product-col {

            justify-content: center;
            align-items: center;
            perspective: 2000px;
            height: 100%;

        }

        
        h1 {
            font-size: 5rem;

            margin: 0 0 2rem 0;
            letter-spacing: -2px;
            font-weight: 500;

        h1 span {

        h1 .italic {
            font-style: italic;
            font-family: 'RetroSerif', serif;
            white-space: nowrap;
            margin-left: -4px;

        p.lead {

            line-height: 1.2;
            margin-bottom: 2rem;
            max-width: 480px;
            font-family: 'RetroSerif', serif;
            letter-spacing: -0.5px;
            color: #444;
        }

        .cta-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            display: inline-block;
            background: var(--ink-black);
            color: #f4f1e6;
            padding: 1rem 2rem;
            font-size: 1.25rem;
            text-decoration: none;
            border-radius: 8px;
            font-family: 'RetroSerif', serif;
            border: 2px solid var(--ink-black);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: transparent;
            color: var(--ink-black);
        }

        .price-tag {
            font-family: 'RetroMono', monospace;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .specs-grid {
            margin-top: 4rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 400px;
        }

        .spec-item h4 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        .spec-item p {
            margin: 0.5rem 0 0 0;
            font-family: 'RetroMono', monospace;
        }

        
        .scene {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(-15deg) rotateX(5deg);
            transition: transform 0.5s ease-out;
        }

        .product-col:hover .scene {
            transform: rotateY(-5deg) rotateX(2deg);
        }

        .computer-unit {
            position: relative;
            width: 360px;
            height: 380px;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            background: var(--beige-main);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .front {
            width: 360px;
            height: 380px;
            transform: translateZ(100px);
            background: linear-gradient(135deg, var(--beige-light) 0%, var(--beige-main) 100%);
            border-radius: 0;
            box-shadow: 
                inset 2px 2px 5px rgba(255,255,255,0.8),
                inset -5px -5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        .back {
            width: 360px;
            height: 380px;
            transform: translateZ(-100px) rotateY(180deg);
            background: var(--beige-dark);
            border-radius: 0;
        }

        .left {
            width: 200px;
            height: 380px;
            transform: rotateY(-90deg) translateZ(100px);
            background: var(--beige-main);
            border-radius: 0;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.05);
        }

        .right {
            width: 200px;
            height: 380px;
            transform: rotateY(90deg) translateZ(260px);
            background: var(--beige-dark);
            border-radius: 0;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.1);
        }

        .top {
            width: 360px;
            height: 200px;
            transform: rotateX(90deg) translateZ(100px);
            background: var(--beige-light);
            border-radius: 0;
        }

        .bottom {
            width: 360px;
            height: 200px;
            transform: rotateX(-90deg) translateZ(280px);
            background: var(--beige-shadow);
            border-radius: 0;
            box-shadow: 0 50px 80px rgba(0,0,0,0.3); 
        }

        
        .screen-inset {
            width: 280px;
            height: 220px;
            background: #D1CEC7;
            border-radius: 16px;
            box-shadow: 
                inset 2px 2px 8px rgba(0,0,0,0.2),
                inset -2px -2px 8px rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
        }

        .crt {
            width: 260px;
            height: 200px;
            background: var(--screen-black);
            border-radius: 40% 40% 40% 40% / 10% 10% 10% 10%; 
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        .crt::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 5;
            pointer-events: none;
            border-radius: 12px;
        }

        .crt-glow {
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            background: transparent;
            border-radius: 12px;
            z-index: 2;
            color: #fff;
            font-family: var(--font-mono);
            padding: 15px;
            font-size: 14px;
            text-shadow: 0 0 2px rgba(255,255,255,0.5);

        .floppy-slot {
            width: 140px;
            height: 12px;
            background: #333;
            border-radius: 6px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
            margin-left: 100px; 
            position: relative;
        }
        
        .logo-badge {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 20px;
            height: 26px;

            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2);
        }
        .logo-badge::before {
            content: "";
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 7px;
            background: #5a3e28;
            border-radius: 1px;
        }

        
        .sticker {
            position: absolute;
            z-index: 5;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            transform-style: flat;
        }

        /* Retro-modern aesthetic stickers inspired by reference */
        .sticker {
            position: absolute;
            z-index: 5;
            transform-style: flat;
        }

        .sticker-starburst {
            width: 38px;
            height: 38px;
            background: #FFD93D;
            top: 48px;
            left: 16px;
            transform: translateZ(101px) rotate(-12deg);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sticker-starburst::after {
            content: '!';
            font-family: 'VT323', monospace;
            font-size: 20px;
            color: #D63031;
            transform: rotate(12deg);
            font-weight: bold;
        }

                2px 2px 4px rgba(0,0,0,0.25),

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 11px;

            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        
        .grill {

            bottom: 15px;
            right: 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            width: 30px;
            height: 20px;

        .vent {
            background: #333;
            border-radius: 1px;
            box-shadow: inset 1px 1px 1px rgba(0,0,0,0.5);
        }

        
        .keyboard-assembly {
            position: absolute;
            width: 360px;
            height: 140px;
            bottom: -118px;
            transform-style: preserve-3d;
            transform-origin: top center;
            --kb-angle: 66deg;
            transform: translateZ(164px) rotateX(var(--kb-angle));
            --kb-thickness: 18px;
        }

        .kb-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--beige-main);
            border-radius: 0;
            box-shadow: 
                inset 1px 1px 2px rgba(255,255,255,0.5),
                inset -5px -5px 15px rgba(0,0,0,0.1);
            transform: translateZ(calc(var(--kb-thickness) / 2));
            overflow: hidden;
        }

        .kb-front,
        .kb-back {
            position: absolute;
            left: 0;
            width: 100%;
            height: var(--kb-thickness);
        }

        .kb-front {
            bottom: 0;
            background: linear-gradient(180deg, #cdc9bb 0%, #b5b1a3 100%);
            transform-origin: bottom center;
            transform: translateZ(calc(var(--kb-thickness) / 2)) rotateX(90deg);
            border-radius: 0;
        }

        .kb-back {
            top: 0;
            background: linear-gradient(180deg, #e5e1d4 0%, #c9c5b8 100%);
            transform-origin: top center;
            transform: translateZ(calc(var(--kb-thickness) / 2)) rotateX(-90deg);
            border-radius: 0;
        }

        .kb-left,
        .kb-right {
            position: absolute;
            top: 0;
            width: var(--kb-thickness);
            height: 100%;
            background: linear-gradient(180deg, #d1cdbf 0%, #b7b3a6 100%);
        }

        .kb-left {
            left: 0;
            transform-origin: left center;
            transform: translateZ(calc(var(--kb-thickness) / 2)) rotateY(90deg);
            border-radius: 0;
        }

        .kb-right {
            right: 0;
            transform-origin: right center;
            transform: translateZ(calc(var(--kb-thickness) / 2)) rotateY(-90deg);
            border-radius: 0;
        }

        .kb-shadow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: transparent;
            transform-origin: top center;
            transform: rotateX(calc(-90deg - var(--kb-angle))) translateZ(20px);
            box-shadow: 
                0 40px 70px rgba(0,0,0,0.25),
                0 20px 30px rgba(0,0,0,0.15);
            pointer-events: none;
            border-radius: 12px;
        }

        .keys-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 6px;
            padding: 15px;
            transform: translateZ(8px);
            transform-style: preserve-3d;
        }

        .key {
            height: 27px;
            background: #ECE8DA;
            border-radius: 4px;
            box-shadow:

                0 8px 7px rgba(0,0,0,0.2);
            transform: translateZ(1px);
            transition: transform 0.05s;
        }

        .key.wide { grid-column: span 2; }
        .key.space { grid-column: span 6; }

        @keyframes typeKey {
            0%, 100% { transform: translateZ(1px) translateY(0); box-shadow: 0 6px 0 #C4C0B3, 0 8px 7px rgba(0,0,0,0.2); }
            50% { transform: translateZ(-2px) translateY(5px); box-shadow: 0 1px 0 #C4C0B3, 0 1px 2px rgba(0,0,0,0.05); }
        }

        
        
        .graffiti-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }
        
.graffiti-text {
            font-family: 'VT323', monospace;
            font-size: 56px;
            font-weight: bold;
            color: #9932CC;
            text-shadow: 
                0 0 8px #9932CC,

            line-height: 0.85;
            letter-spacing: 3px;
        }
        
        .subtitle-text {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-size: 28px;
            color: #E8D5F2;
            margin-top: 12px;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(153, 50, 204, 0.6);
        }
        
        @keyframes warpy {
            0%, 100% { transform: scale(1) skewX(0deg); filter: hue-rotate(0deg); }
            25% { transform: scale(1.05) skewX(-3deg); }
            50% { transform: scale(0.98) skewX(2deg); filter: hue-rotate(15deg); }
            75% { transform: scale(1.02) skewX(-1deg); }
        }
        
        .cursor {
            display: none;
        }

        .type-content {
            white-space: pre-wrap;
        }
        
        
        .crt-ui {
            display: flex;
            height: 100%;
        }
        .sidebar {
            width: 30%;
            border-right: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            font-size: 10px;
            color: #ccc;
        }
        .main-area {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .window {
            background: #fff;
            color: #000;
            border-radius: 2px;
            padding: 5px;
            margin-top: 10px;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.5);

            font-size: 10px;
        }
        .window-header {
            border-bottom: 1px dotted #000;
            margin-bottom: 5px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        
        .icon-list div {
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .icon-circle { width: 8px; height: 8px; border-radius: 50%; background: #555; }
        .icon-circle.blue { background: #468CCF; }
        .icon-circle.orange { background: #E57D25; }
        
        .typing-container {
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.2;
            color: #333;
        }

        
        @media (max-width: 1000px) {
            .main-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                height: auto;
                padding: 2rem;
            }
            .content-col {
                padding: 0;
                margin-bottom: 3rem;
                text-align: center;
            }
            .cta-group {
                justify-content: center;
            }
            .specs-grid {
                margin: 3rem auto 0;
            }
            .scene {
                transform: scale(0.8) rotateY(-15deg) rotateX(5deg);
            }
        }
    </style>
